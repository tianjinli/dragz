apiVersion: v1
kind: Service
metadata:
  namespace: dragz
  name: loki-service
spec:
  ports:
    - port: 3100
      name: http
  selector:
    app: loki
---
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: dragz
  name: loki-config
data:
  loki.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
    
    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    ingester:
      chunk_idle_period: 5m
      chunk_retain_period: 30s
      max_transfer_retries: 0

    compactor:
      working_directory: /loki/compactor
      shared_store: filesystem
      compaction_interval: 10m
      retention_enabled: true

    schema_config:
      configs:
        - from: 2020-10-24
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h

    storage_config:
      boltdb_shipper:
        active_index_directory: /loki/index
        cache_location: /loki/cache
      filesystem:
        directory: /loki/chunks

    limits_config:
      retention_period: 168h
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: dragz
  name: loki-stateful-set
spec:
  serviceName: loki-service
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      initContainers:
        - name: init-loki-dirs
          image: grafana/loki:2.9.3
          command: ['sh', '-c', 'mkdir -p /loki/index /loki/cache /loki/chunks /loki/compactor && chown -R 10001:10001 /loki']
          securityContext:
            runAsUser: 0 # run as root
          volumeMounts:
            - name: data
              mountPath: /loki
      containers:
        - name: loki
          image: grafana/loki:2.9.3
          imagePullPolicy: IfNotPresent
          args:
            - -config.file=/etc/loki/loki.yaml
          ports:
            - containerPort: 3100
          env:
            - name: TZ
              value: "Asia/Shanghai"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "400m"
              memory: "512Mi"
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: data
              mountPath: /loki
      volumes:
        - name: config
          configMap:
            name: loki-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
